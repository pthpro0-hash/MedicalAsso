services:
  postgres:
    image: postgres:16
    container_name: association-doctor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: association_doctor_recommendation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d association_doctor_recommendation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

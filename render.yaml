services:
  - type: web
    name: medical-asso
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run db:deploy && npm run db:bootstrap && npx next start -p $PORT
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medical-asso-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_NAME
        value: 최고관리자
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: medical-asso-db
    databaseName: association_doctor_recommendation
    user: medical_asso
    plan: free
    postgresMajorVersion: "16"
